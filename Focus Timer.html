<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Mode - Pomodoro</title>
<style>
    :root {
        --bg: #1a1d23;
        --card: #2a2f3a;
        --accent: #6ee7b7;
        --text: #e5e7eb;
        --muted: #9ca3af;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 20px;
    }
    .container {
        width: 100%;
        max-width: 900px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    
    .card {
        background: var(--card);
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    h2 { margin-bottom: 15px; color: var(--accent); }
    
    /* Pomodoro */
    .timer {
        text-align: center;
        grid-column: 1 / -1;
    }
    .circle {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: 8px solid var(--accent);
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 20px auto;
        font-size: 48px;
        font-weight: bold;
        transition: 0.3s;
    }
    .btns { display: flex; gap: 10px; justify-content: center; }
    button {
        background: var(--accent);
        color: #000;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
    }
    button:hover { opacity: 0.8; }
    .mode-select { margin-top: 10px; display: flex; gap: 10px; justify-content: center; }
    .mode-select button { background: #374151; color: var(--text); }
    .mode-select button.active { background: var(--accent); color: #000; }

    /* To-Do */
    input[type="text"] {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #374151;
        color: var(--text);
        margin-bottom: 10px;
    }
    .todo-item {
        display: flex;
        justify-content: space-between;
        padding: 8px;
        background: #374151;
        border-radius: 8px;
        margin-bottom: 8px;
    }
    .todo-item.done { text-decoration: line-through; opacity: 0.5; }
    .todo-item span { cursor: pointer; }

    /* Mood Tracker */
    .moods { display: flex; gap: 10px; justify-content: center; font-size: 32px; }
    .mood { cursor: pointer; transition: 0.2s; }
    .mood:hover { transform: scale(1.3); }
    .mood-log { margin-top: 10px; font-size: 14px; color: var(--muted); }
</style>
</head>
<body>

<div class="container">
    <!-- 1. POMODORO TIMER -->
    <div class="card timer">
        <h2>🎯 Focus Timer</h2>
        <div class="mode-select">
            <button class="mode-btn active" data-min="25">Focus 25</button>
            <button class="mode-btn" data-min="5">Break 5</button>
            <button class="mode-btn" data-min="15">Long Break 15</button>
        </div>
        <div class="circle" id="timer">25:00</div>
        <div class="btns">
            <button id="startBtn">Start</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <!-- 2. TO-DO LIST -->
    <div class="card">
        <h2>📝 Today's Tasks</h2>
        <input type="text" id="taskInput" placeholder="Add a task and press Enter">
        <div id="taskList"></div>
    </div>

    <!-- 3. MOOD TRACKER -->
    <div class="card">
        <h2>😊 How are you feeling?</h2>
        <div class="moods">
            <span class="mood" data-mood="😡">😡</span>
            <span class="mood" data-mood="😢">😢</span>
            <span class="mood" data-mood="😐">😐</span>
            <span class="mood" data-mood="😊">😊</span>
            <span class="mood" data-mood="🤩">🤩</span>
        </div>
        <div class="mood-log" id="moodLog"></div>
    </div>
</div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
    // ===== 1. POMODORO LOGIC =====
    let time = 25 * 60;
    let interval;
    let isRunning = false;
    const timerEl = document.getElementById('timer');
    const alarm = document.getElementById('alarm');

    function updateTimer() {
        let min = Math.floor(time / 60);
        let sec = time % 60;
        timerEl.textContent = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        if(time <= 0) {
            clearInterval(interval);
            alarm.play();
            alert("Time's up! Take a break.");
            isRunning = false;
            document.getElementById('startBtn').textContent = 'Start';
        }
    }

    document.getElementById('startBtn').onclick = () => {
        if(!isRunning) {
            interval = setInterval(() => { time--; updateTimer(); }, 1000);
            isRunning = true;
            document.getElementById('startBtn').textContent = 'Pause';
        } else {
            clearInterval(interval);
            isRunning = false;
            document.getElementById('startBtn').textContent = 'Start';
        }
    }

    document.getElementById('resetBtn').onclick = () => {
        clearInterval(interval);
        isRunning = false;
        document.querySelector('.mode-btn.active').click();
        document.getElementById('startBtn').textContent = 'Start';
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            time = parseInt(btn.dataset.min) * 60;
            updateTimer();
        }
    });

    // ===== 2. TO-DO LIST WITH LOCALSTORAGE =====
    let tasks = JSON.parse(localStorage.getItem('focusTasks')) || [];
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');

    function renderTasks() {
        taskList.innerHTML = '';
        tasks.forEach((task, i) => {
            const div = document.createElement('div');
            div.className = 'todo-item' + (task.done ? ' done' : '');
            div.innerHTML = `<span onclick="toggleTask(${i})">${task.text}</span> <span onclick="deleteTask(${i})">❌</span>`;
            taskList.appendChild(div);
        });
    }

    function saveTasks() {
        localStorage.setItem('focusTasks', JSON.stringify(tasks));
    }

    taskInput.onkeypress = (e) => {
        if(e.key === 'Enter' && taskInput.value.trim() !== '') {
            tasks.push({text: taskInput.value, done: false});
            taskInput.value = '';
            saveTasks();
            renderTasks();
        }
    }

    function toggleTask(i) { tasks[i].done = !tasks[i].done; saveTasks(); renderTasks(); }
    function deleteTask(i) { tasks.splice(i,1); saveTasks(); renderTasks(); }
    renderTasks();

    // ===== 3. MOOD TRACKER =====
    let moods = JSON.parse(localStorage.getItem('focusMoods')) || [];
    const moodLog = document.getElementById('moodLog');

    document.querySelectorAll('.mood').forEach(m => {
        m.onclick = () => {
            const mood = m.dataset.mood;
            const today = new Date().toLocaleDateString();
            moods.push({mood, date: today});
            localStorage.setItem('focusMoods', JSON.stringify(moods));
            renderMoods();
        }
    });

    function renderMoods() {
        const last5 = moods.slice(-5).reverse();
        moodLog.innerHTML = last5.map(m => `${m.date}: ${m.mood}`).join('<br>');
    }
    renderMoods();
</script>
</body>
</html>
